<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="KODOCO OGP">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF8F4"/>

  <!-- Left warm band -->
  <rect x="0" y="0" width="520" height="630" fill="#F3EEE4"/>

  <!-- コドちゃん (wave) — enlarged -->
  <g transform="translate(140, 115) scale(2.05)">
    <path d="M 64 32 Q 46 14 38 28 Q 36 42 58 38 Q 66 36 64 32 Z" fill="#7A9B7E"/>
    <path d="M 96 32 Q 114 14 122 28 Q 124 42 102 38 Q 94 36 96 32 Z" fill="#8DAE91"/>
    <rect x="77" y="30" width="6" height="24" rx="3" fill="#6E8A70"/>
    <ellipse cx="80" cy="108" rx="58" ry="54" fill="#F4E5D2"/>
    <ellipse cx="80" cy="158" rx="40" ry="4" fill="#D8C8B0" opacity="0.35"/>
    <path d="M 132 95 Q 145 80, 148 55 Q 149 46 141 47 Q 133 49 128 72 Q 126 88 132 95 Z" fill="#F4E5D2"/>
    <circle cx="144" cy="50" r="9" fill="#F4E5D2"/>
    <ellipse cx="48" cy="116" rx="10" ry="6" fill="#F2B89A" opacity="0.65"/>
    <ellipse cx="112" cy="116" rx="10" ry="6" fill="#F2B89A" opacity="0.65"/>
    <circle cx="63" cy="97" r="3.2" fill="#2C2A26"/>
    <circle cx="97" cy="97" r="3.2" fill="#2C2A26"/>
    <circle cx="64" cy="96" r="1" fill="#fff"/>
    <circle cx="98" cy="96" r="1" fill="#fff"/>
    <path d="M 68 126 Q 80 138, 92 126" stroke="#2C2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="62" cy="166" rx="11" ry="4" fill="#E5D0B6"/>
    <ellipse cx="98" cy="166" rx="11" ry="4" fill="#E5D0B6"/>
  </g>

  <!-- Right text block -->
  <g font-family="Inter, 'Noto Sans JP', sans-serif">
    <!-- Eyebrow -->
    <text x="580" y="178" font-size="22" font-weight="600" fill="#5B7F61" letter-spacing="5">— PROTOTYPE · 滋賀</text>
    <!-- Logo -->
    <text x="580" y="306" font-size="128" font-weight="900" fill="#2C2A26" letter-spacing="-7">KODOCO</text>
    <!-- Main copy -->
    <text x="580" y="388" font-size="56" font-weight="800" fill="#2C2A26" letter-spacing="-2">今日どこいく？</text>
    <!-- Sub copy -->
    <text x="580" y="452" font-size="26" font-weight="400" fill="#6E6A62">子連れで失敗しない場所が、</text>
    <text x="580" y="490" font-size="26" font-weight="400" fill="#6E6A62">今日の状況でわかる。</text>
    <!-- Studio tag -->
    <text x="580" y="572" font-size="18" font-weight="500" fill="#A8A39A" letter-spacing="3">KINOSHITA STUDIO</text>
  </g>

  <!-- Decorative leaf accent (bottom right) -->
  <g opacity="0.55" transform="translate(1070, 540)">
    <path d="M 30 10 Q 10 -10 2 10 Q 2 24 24 24 Z" fill="#7A9B7E"/>
    <path d="M 50 10 Q 70 -10 78 10 Q 78 24 56 24 Z" fill="#8DAE91"/>
    <rect x="37" y="12" width="6" height="14" rx="3" fill="#6E8A70"/>
  </g>
</svg>
