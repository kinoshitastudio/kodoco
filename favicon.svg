<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="KODOCO icon">
  <!-- background: warm cream with rounded square -->
  <rect width="100" height="100" rx="22" fill="#FAF8F4"/>
  <!-- leaves -->
  <path d="M 38 22 Q 22 10 18 22 Q 18 32 34 30 Z" fill="#7A9B7E"/>
  <path d="M 62 22 Q 78 10 82 22 Q 82 32 66 30 Z" fill="#8DAE91"/>
  <!-- stem -->
  <rect x="47" y="24" width="6" height="14" rx="3" fill="#6E8A70"/>
  <!-- body -->
  <ellipse cx="50" cy="68" rx="36" ry="32" fill="#F4E5D2"/>
  <!-- cheeks -->
  <ellipse cx="30" cy="74" rx="6" ry="4" fill="#F2B89A" opacity="0.6"/>
  <ellipse cx="70" cy="74" rx="6" ry="4" fill="#F2B89A" opacity="0.6"/>
  <!-- eyes (closed happy) -->
  <path d="M 34 62 Q 40 58, 46 62" stroke="#2C2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 54 62 Q 60 58, 66 62" stroke="#2C2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- smile -->
  <path d="M 40 82 Q 50 90, 60 82" stroke="#2C2A26" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
